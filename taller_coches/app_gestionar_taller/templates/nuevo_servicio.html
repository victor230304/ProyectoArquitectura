<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f4f7fb, #e9eef5);
            color: #333;
            padding: 40px 20px;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 35px;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 25px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #1f3c88, #2c5282);
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(31, 60, 136, 0.25);
            transition: all 0.25s ease;
        }

        .back-button:hover {
            background: linear-gradient(135deg, #162d66, #1f3c88);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(31, 60, 136, 0.35);
        }

        h2 {
            font-size: 2rem;
            color: #1f3c88;
            margin-bottom: 25px;
            border-bottom: 3px solid #e6ecf5;
            padding-bottom: 10px;
        }

        form {
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2d3748;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e0;
            border-radius: 12px;
            font-size: 0.96rem;
            background: #f8fafc;
            transition: all 0.2s ease;
        }

        textarea {
            min-height: 130px;
            resize: vertical;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #1f3c88;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(31, 60, 136, 0.12);
        }

        .submit-button {
            display: inline-block;
            padding: 12px 22px;
            background: linear-gradient(135deg, #1f3c88, #2c5282);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(31, 60, 136, 0.25);
            transition: all 0.25s ease;
        }

        .submit-button:hover {
            background: linear-gradient(135deg, #162d66, #1f3c88);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(31, 60, 136, 0.35);
        }

        .error-box {
            margin-bottom: 20px;
            padding: 14px 16px;
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            border-radius: 12px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 22px;
            }

            h2 {
                font-size: 1.6rem;
            }

            .back-button,
            .submit-button {
                font-size: 0.9rem;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'lista_servicios' %}" class="back-button">← Volver a servicios</a>

        <h2>{{ titulo }}</h2>

        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="nombre">Nombre del servicio</label>
                <input type="text" name="nombre" id="nombre" required>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea name="descripcion" id="descripcion" required></textarea>
            </div>

            <div class="form-group">
                <label for="coche">Coche asignado</label>
                <select name="coche" id="coche" required>
                    <option value="">Selecciona un coche</option>
                    {% for coche in coches %}
                        <option value="{{ coche.id }}">
                            {{ coche.marca }} {{ coche.modelo }} - {{ coche.matricula }} ({{ coche.cliente.nombre }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="submit-button">Guardar servicio</button>
        </form>
    </div>
</body>
</html>
