<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de coches</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f4f7fb, #e9eef5);
            color: #333;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 35px;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 25px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #1f3c88, #2c5282);
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(31, 60, 136, 0.25);
            transition: all 0.25s ease;
        }

        .back-button:hover {
            background: linear-gradient(135deg, #162d66, #1f3c88);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(31, 60, 136, 0.35);
        }

        h1 {
            font-size: 2rem;
            color: #1f3c88;
            margin-bottom: 25px;
            border-bottom: 3px solid #e6ecf5;
            padding-bottom: 10px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
        }

        thead {
            background: #1f3c88;
            color: white;
        }

        th, td {
            text-align: left;
            padding: 15px 18px;
        }

        th {
            font-size: 1rem;
            letter-spacing: 0.3px;
        }

        tbody tr {
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s ease;
        }

        tbody tr:nth-child(even) {
            background: #f8fafc;
        }

        tbody tr:hover {
            background: #eef4ff;
        }

        td {
            font-size: 0.96rem;
            color: #2d3748;
        }

        .empty-message {
            margin-top: 20px;
            background: #fff4e5;
            color: #9a6700;
            border: 1px solid #f5d08a;
            padding: 15px;
            border-radius: 12px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 22px;
            }

            h1 {
                font-size: 1.6rem;
            }

            th, td {
                padding: 12px 10px;
                font-size: 0.9rem;
            }

            .back-button {
                font-size: 0.9rem;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'menu_principal' %}" class="back-button">← Volver al menú</a>

        <h1>Lista de coches</h1>

        {% if coches %}
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Matrícula</th>
                        <th>Cliente</th>
                    </tr>
                </thead>
                <tbody>
                    {% for coche in coches %}
                    <tr>
                        <td>{{ coche.id }}</td>
                        <td><a href="{% url 'detalle_coche' coche.id %}">{{ coche.marca }}</a></td>
                        <td>{{ coche.modelo }}</td>
                        <td>{{ coche.matricula }}</td>
                        <td><a href="{% url 'detalle_cliente' coche.cliente.id %}">{{ coche.cliente.nombre }}</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
            <p class="empty-message">No hay coches registrados en el taller.</p>
        {% endif %}
    </div>
</body>
</html>
