<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle del coche</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f4f7fb, #e9eef5);
            color: #333;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 35px;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 25px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #1f3c88, #2c5282);
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(31, 60, 136, 0.25);
            transition: all 0.25s ease;
        }

        .back-button:hover {
            background: linear-gradient(135deg, #162d66, #1f3c88);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(31, 60, 136, 0.35);
        }

        h1 {
            font-size: 2rem;
            color: #1f3c88;
            margin-bottom: 20px;
            border-bottom: 3px solid #e6ecf5;
            padding-bottom: 10px;
        }

        .info {
            background: #f8fafc;
            border-left: 5px solid #1f3c88;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 18px;
        }

        .info p {
            margin-bottom: 12px;
            font-size: 1rem;
            color: #2d3748;
        }

        .info p:last-child {
            margin-bottom: 0;
        }

        strong {
            color: #1a202c;
        }

        @media (max-width: 600px) {
            .container {
                padding: 22px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .info p {
                font-size: 0.95rem;
            }

            .back-button {
                font-size: 0.9rem;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'lista_coches' %}" class="back-button">← Volver a coches</a>

        <h1>{{ coche.marca }} {{ coche.modelo }}</h1>

        <div class="info">
            <p><strong>ID:</strong> {{ coche.id }}</p>
            <p><strong>Marca:</strong> {{ coche.marca }}</p>
            <p><strong>Modelo:</strong> {{ coche.modelo }}</p>
            <p><strong>Matrícula:</strong> {{ coche.matricula }}</p>
            <p><strong>Cliente:</strong> {{ coche.cliente.nombre }}</p>
            <p><strong>Teléfono del cliente:</strong> {{ coche.cliente.telefono }}</p>
            <p><strong>Email del cliente:</strong> {{ coche.cliente.email }}</p>
        </div>
    </div>
</body>
</html>
